<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FFE600" />
  <title>Rei dos Achadinhos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --ml-yellow: #ffe600;
      --ml-yellow-dark: #f4c400;
      --green: #00a650;
      --green-dark: #007a3d;
      --black: #111111;
      --soft-black: #252525;
      --gray: #666666;
      --light: #ffffff;
      --card: #fffdf7;
      --line: rgba(0, 0, 0, 0.08);
      --shadow: 0 22px 60px rgba(18, 18, 18, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Poppins", Arial, Helvetica, sans-serif;
      color: var(--black);
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.62), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255,255,255,.35), transparent 26%),
        linear-gradient(135deg, var(--ml-yellow) 0%, #ffd400 48%, #fff1a8 100%);
      display: grid;
      place-items: center;
      padding: 18px 12px;
    }

    .page {
      width: min(100%, 410px);
    }

    .card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: var(--shadow);
      padding: 24px 20px 20px;
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 92%;
      height: 6px;
      transform: translateX(-50%);
      border-radius: 0 0 999px 999px;
      background: linear-gradient(90deg, var(--ml-yellow), var(--green));
    }

    .top-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 15px;
      border-radius: 999px;
      color: #fff;
      background: var(--green);
      box-shadow: 0 10px 25px rgba(0,166,80,.25);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .2px;
      margin: 6px 0 16px;
      white-space: nowrap;
    }

    .top-label svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .brand-icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 13px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 35% 25%, #20d65d 0%, #009a38 58%, #00792e 100%);
      border: 5px solid #161616;
      box-shadow: 0 10px 22px rgba(0,0,0,.18), inset 0 3px 14px rgba(255,255,255,.22);
    }

    .brand-icon svg {
      width: 59px;
      height: 59px;
      filter: drop-shadow(0 3px 0 rgba(0,0,0,.28));
    }

    .brand-name {
      margin: 0 auto 6px;
      max-width: 330px;
      font-weight: 900;
      line-height: .98;
      letter-spacing: -1.5px;
      text-transform: none;
    }

    .brand-name .line-one {
      display: block;
      font-size: clamp(36px, 9vw, 46px);
      color: var(--black);
    }

    .brand-name .line-two {
      display: block;
      font-size: clamp(38px, 9.8vw, 49px);
      color: var(--black);
    }

    .group-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 31px;
      padding: 5px 22px;
      border-radius: 999px;
      background: var(--ml-yellow);
      color: var(--black);
      font-size: 17px;
      line-height: 1;
      font-weight: 700;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.10);
      margin-bottom: 16px;
    }

    .main-offer {
      font-size: clamp(25px, 6vw, 31px);
      line-height: 1.08;
      font-weight: 500;
      color: #222;
      margin-bottom: 13px;
    }

    .main-offer strong {
      display: block;
      font-weight: 900;
      color: #111;
    }

    .underline {
      width: 70px;
      height: 5px;
      border-radius: 999px;
      background: var(--ml-yellow);
      margin: -5px auto 15px;
    }

    .benefit-icons {
      display: flex;
      justify-content: center;
      gap: 13px;
      margin-bottom: 18px;
    }

    .mini-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--green);
      box-shadow: 0 8px 18px rgba(0,166,80,.23);
      border: 2px solid rgba(255,255,255,.75);
    }

    .mini-icon svg {
      width: 27px;
      height: 27px;
    }

    .cta {
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: 14px;
      color: var(--black);
      background: linear-gradient(180deg, #ffea38 0%, var(--ml-yellow) 100%);
      border: 1px solid rgba(0,0,0,.06);
      text-decoration: none;
      font-size: clamp(22px, 5.8vw, 29px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.6px;
      box-shadow: 0 8px 0 var(--ml-yellow-dark), 0 16px 25px rgba(0,0,0,.12);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cta:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--ml-yellow-dark), 0 9px 17px rgba(0,0,0,.12);
    }

    .cta svg {
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
    }

    .private-line {
      margin-top: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #5f5f5f;
      font-size: 15px;
      line-height: 1;
      font-weight: 500;
    }

    .private-line svg {
      width: 18px;
      height: 18px;
    }

    .safe-note {
      max-width: 330px;
      margin: 10px auto 0;
      color: var(--gray);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 500;
    }

    .safe-note strong {
      color: #444;
      font-weight: 800;
    }

    @media (min-width: 760px) {
      body {
        padding: 18px;
      }

      .page {
        width: 390px;
      }

      .card {
        padding: 21px 19px 18px;
      }

      .brand-icon {
        width: 78px;
        height: 78px;
        margin-bottom: 11px;
      }

      .brand-icon svg {
        width: 52px;
        height: 52px;
      }

      .top-label {
        margin-bottom: 13px;
      }

      .brand-name .line-one {
        font-size: 39px;
      }

      .brand-name .line-two {
        font-size: 43px;
      }

      .group-pill {
        font-size: 15px;
        margin-bottom: 13px;
      }

      .main-offer {
        font-size: 27px;
        margin-bottom: 11px;
      }

      .benefit-icons {
        margin-bottom: 15px;
      }

      .cta {
        min-height: 58px;
        font-size: 26px;
      }
    }

    @media (max-height: 700px) and (min-width: 700px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .card {
        padding-top: 18px;
      }

      .top-label {
        min-height: 30px;
        font-size: 11px;
        margin-bottom: 10px;
      }

      .brand-icon {
        width: 68px;
        height: 68px;
        margin-bottom: 8px;
      }

      .brand-icon svg {
        width: 45px;
        height: 45px;
      }

      .brand-name .line-one {
        font-size: 35px;
      }

      .brand-name .line-two {
        font-size: 38px;
      }

      .group-pill {
        min-height: 27px;
        font-size: 14px;
        margin-bottom: 10px;
      }

      .main-offer {
        font-size: 24px;
        margin-bottom: 9px;
      }

      .underline {
        margin-bottom: 11px;
      }

      .benefit-icons {
        margin-bottom: 12px;
      }

      .mini-icon {
        width: 42px;
        height: 42px;
      }

      .mini-icon svg {
        width: 24px;
        height: 24px;
      }

      .cta {
        min-height: 54px;
        font-size: 23px;
      }

      .private-line {
        margin-top: 12px;
        font-size: 13px;
      }

      .safe-note {
        display: none;
      }
    }

    @media (max-width: 380px) {
      body {
        padding: 10px;
      }

      .card {
        border-radius: 25px;
        padding: 20px 15px 17px;
      }

      .top-label {
        font-size: 10.5px;
        padding-inline: 11px;
      }

      .brand-icon {
        width: 74px;
        height: 74px;
      }

      .brand-icon svg {
        width: 50px;
        height: 50px;
      }

      .group-pill {
        font-size: 14px;
      }

      .main-offer {
        font-size: 24px;
      }

      .mini-icon {
        width: 44px;
        height: 44px;
      }

      .cta {
        min-height: 58px;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Página de entrada do grupo Rei dos Achadinhos">
    <section class="card">
      <div class="top-label">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="16" cy="16" r="16" fill="#ffffff"/>

          <path d="M24 83h72l-6.5 14.5h-59L24 83Z" fill="#ffcc00" stroke="#111" stroke-width="7" stroke-linejoin="round"/>
          <path d="M27 79 36 37l20 29 4-43 4 43 20-29 9 42H27Z" fill="#ffe600" stroke="#111" stroke-width="7" stroke-linejoin="round"/>

          <circle cx="84" cy="36" r="9" fill="#ffcc00" stroke="#111" stroke-width="6"/>

      </div>

      <h1 class="brand-name">
        <span class="line-one">Rei do</span>
        <span class="line-two">Achadinhos</span>
      </h1>

      <div class="group-pill">Grupo de ofertas</div>

      <p class="main-offer">
        Ofertas <strong>todos os dias</strong>
      </p>
      <div class="underline" aria-hidden="true"></div>

      <div class="benefit-icons" aria-label="Benefícios do grupo">
        <div class="mini-icon" title="Descontos" aria-label="Descontos">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 24 24 8" stroke="#ffe600" stroke-width="4" stroke-linecap="round"/>
            <circle cx="10" cy="10" r="4" fill="#ffe600"/>
            <circle cx="22" cy="22" r="4" fill="#ffe600"/>
          </svg>
        </div>
        <div class="mini-icon" title="Achados" aria-label="Achados">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 9h3l2.4 11.2a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 1.9-1.4L27 12H12" fill="none" stroke="#ffe600" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="15" cy="25" r="2.4" fill="#ffe600"/>

        <div class="mini-icon" title="Promoções rápidas" aria-label="Promoções rápidas">

      <div class="private-line">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="5" y="10" width="14" height="10" rx="2" fill="none" stroke="#666" stroke-width="2"/>
          <path d="M8 10V7a4 4 0 0 1 8 0v3" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round"/>

        Grupo privado
      </div>

      <p class="safe-note">
        <strong>Página independente.</strong> As ofertas podem mudar conforme preço, estoque e disponibilidade no Mercado Livre.
      </p>
    </section>
  </main>
</body>
</html>
